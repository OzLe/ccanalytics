name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, lint & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
        with:
          # scripts/update-version.sh reads git history for build metadata.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test

  dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # scripts/update-version.sh (run by the dashboard build) reads git
          # history for the full version string.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json
      # Root deps first: the dashboard server typechecks shared modules from
      # ../src (e.g. queries/recommendation-analyzer -> db/executor), which
      # import @duckdb/node-api from the ROOT package. Without the root
      # install, tsc -b fails with TS2307 on @duckdb/node-api.
      - run: npm ci
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard
